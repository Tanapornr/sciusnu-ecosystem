<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ใบประกาศนียบัตร</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Prompt',sans-serif}</style></head><body class="bg-slate-50 text-slate-700"><div class="max-w-5xl mx-auto p-6"><h1 class="text-2xl font-bold mb-4">ใบประกาศนียบัตร</h1><div id="certBox" class="grid md:grid-cols-2 gap-4"></div><a class="inline-block mt-6 text-indigo-600" href="staff.html">กลับหน้าบทเรียน</a></div><script>
const API_URL="https://script.google.com/macros/s/AKfycby_LQtHrmRmUDHrGVVgp_0vVfTpHPZTFzbty5GrU2ObqojoeavuSyYmmkVzeF7iqD0ffg/exec";
const user=JSON.parse(localStorage.getItem('user')||'{}');
const p=JSON.parse(localStorage.getItem(`lessonProgress_${(user.username||'guest').toLowerCase()}`)||'{}');
function ord(t){let m=t.match(/^AI-(\d+)/i); if(m)return +m[1]; m=t.match(/^5ส-(\d+)/i); if(m)return 100+ +m[1]; return 999}
(async()=>{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getLessons'})});const j=await r.json();const ls=(j.lessons||[]).sort((a,b)=>ord(a.title)-ord(b.title));document.getElementById('certBox').innerHTML=ls.map(l=>{const s=p[l.id]||{};const ok=!!s.postDone;return `<div class="bg-white border rounded-xl p-4 ${ok?'':'opacity-60'}"><div class="font-semibold">${l.title}</div><div class="text-xs text-slate-500 my-2">${ok?'ผ่านเกณฑ์ พร้อมใบประกาศ':'ยังไม่ผ่านเกณฑ์'}</div>${ok?`<button class="px-3 py-1 bg-indigo-600 text-white rounded" onclick="alert('ดาวน์โหลดใบประกาศ: ${l.title}')">ดาวน์โหลด</button>`:'<div class="text-xs">เรียนให้จบและทำ Post-test ให้ผ่าน</div>'}</div>`}).join('')||'<div>ไม่พบบทเรียน</div>'})();
</script></body></html>
