<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>กิจกรรมของฉัน</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Prompt',sans-serif}</style></head><body class="bg-slate-50 text-slate-700"><div class="max-w-5xl mx-auto p-6"><h1 class="text-2xl font-bold mb-4">กิจกรรมของฉัน</h1><div id="logBox" class="space-y-3"></div><a class="inline-block mt-6 text-indigo-600" href="staff.html">กลับหน้าบทเรียน</a></div><script>
const user=JSON.parse(localStorage.getItem('user')||'{}');
const key=`activityLog_${(user.username||'guest').toLowerCase()}`;
const logs=JSON.parse(localStorage.getItem(key)||'[]');
const map={pretest_done:'ทำ Pre-test',video_done:'ดูวิดีโอจบ',posttest_done:'ทำ Post-test'};
const box=document.getElementById('logBox');
if(!logs.length){box.innerHTML='<div class="bg-white border rounded-xl p-4 text-slate-500">ยังไม่มีกิจกรรม</div>';}
else box.innerHTML=logs.map(x=>`<div class="bg-white border rounded-xl p-4"><div class="font-semibold">${map[x.action]||x.action}</div><div class="text-xs text-slate-500">${x.lessonTitle||'-'} | ${new Date(x.time).toLocaleString('th-TH')}</div>${x.score!=null?`<div class="text-xs mt-1">คะแนน: ${x.score}/${x.total}</div>`:''}</div>`).join('');
</script></body></html>
