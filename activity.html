<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>กิจกรรมของฉัน - Learning Ecosystem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Prompt',sans-serif;background:#f8fafc}</style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">
  <aside class="w-64 bg-slate-950 text-white flex flex-col justify-between hidden md:flex z-20">
    <div>
      <div class="p-6 flex items-center gap-3"><div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="ph-fill ph-book-open text-xl"></i></div><h1 class="text-base font-semibold leading-tight">Learning<br>Ecosystem</h1></div>
      <nav class="px-4 space-y-1 text-sm">
        <a href="staff-home.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-house text-xl"></i> หน้าหลัก</a>
        <a href="staff.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-graduation-cap text-xl"></i> คอร์สเรียนของฉัน</a>
        <a href="learning-plan.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-git-branch text-xl"></i> แผนการเรียนรู้</a>
        <a href="certificates.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-certificate text-xl"></i> ใบประกาศนียบัตร</a>
        <a href="history.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-clock-counter-clockwise text-xl"></i> ประวัติการเรียน</a>
        <a href="favorites.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-heart text-xl"></i> รายการโปรด</a>
        <a href="activity.html" class="flex items-center gap-3 px-4 py-2.5 bg-indigo-600 text-white rounded-xl font-medium"><i class="ph-fill ph-activity text-xl"></i> กิจกรรมของฉัน</a>
        <a href="settings.html" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-gear text-xl"></i> ตั้งค่า</a>
      </nav>
    </div>
    <div class="p-4 border-t border-slate-800"><button onclick="handleLogout()" class="w-full bg-slate-800 hover:bg-red-900/40 text-slate-300 hover:text-red-200 text-sm py-2.5 rounded-xl">ออกจากระบบ</button></div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
      <div class="relative w-96"><i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" placeholder="ค้นหากิจกรรม..." class="w-full bg-slate-100 text-sm rounded-full pl-10 pr-4 py-2.5 focus:outline-none"></div>
      <div class="flex items-center gap-3 border-l pl-4"><div id="avatarContainer" class="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">US</div><div class="text-sm"><p id="userNameText" class="font-semibold text-slate-800 leading-tight">-</p><p id="userDeptText" class="text-xs text-slate-400">-</p></div></div>
    </header>

    <div class="p-8 max-w-[1400px] w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <div class="flex items-center gap-4"><div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl"><i class="ph-fill ph-activity"></i></div><div><h2 class="text-xl font-bold text-slate-800">กิจกรรมของฉัน</h2><p class="text-xs text-slate-400">ไทม์ไลน์การเรียนรู้จริงของผู้ใช้งาน</p></div></div>
        <div class="bg-white border rounded-2xl p-6"><div id="timeline" class="space-y-4"></div></div>
      </div>
      <div class="space-y-6">
        <div class="bg-white border rounded-2xl p-5">
          <h3 class="font-semibold mb-3">สรุปกิจกรรม</h3>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between"><span class="text-slate-500">จำนวนรายการ</span><span id="logCount" class="font-semibold">0</span></div>
            <div class="flex justify-between"><span class="text-slate-500">ล่าสุด</span><span id="lastSeen" class="font-semibold">-</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="learner-state.js"></script>
  <script>
    function handleLogout(){localStorage.removeItem('user');window.location.href='index.html';}
    const user = JSON.parse(localStorage.getItem('user')||'{}');
    if(!user?.username) location.href='index.html';
    document.getElementById('userNameText').innerText = user.name || 'ผู้เรียน';
    document.getElementById('userDeptText').innerText = user.department || 'บุคลากรสายสนับสนุน';
    document.getElementById('avatarContainer').innerText = (user.name||'US').slice(0,2);

    (async()=>{
      await LearnerState.init(user);
      let logs = LearnerState.getActivities();
      if(!Array.isArray(logs)) logs = [];
      if(!logs.length){
        LearnerState.addActivity({ action:'เข้าสู่ระบบ', lessonTitle:'Learning Ecosystem' });
        logs = LearnerState.getActivities();
      }
      const map = {pretest_done:'ทำ Pre-test',video_done:'ดูวิดีโอจบ',posttest_done:'ทำ Post-test'};
      const items = logs.slice().reverse();
      document.getElementById('logCount').innerText = items.length;
      document.getElementById('lastSeen').innerText = new Date(items[0].time).toLocaleString('th-TH');
      document.getElementById('timeline').innerHTML = items.map(x=>`
        <div class="border rounded-xl p-4 ${x.action==='posttest_done'?'bg-emerald-50 border-emerald-200':'bg-white'}">
          <p class="font-semibold text-slate-800">${map[x.action]||x.action}</p>
          <p class="text-xs text-slate-500 mt-1">${x.lessonTitle||'-'}</p>
          ${x.score!=null?`<p class="text-xs mt-1 text-indigo-600">คะแนน: ${x.score}/${x.total}</p>`:''}
          <p class="text-xs text-slate-400 mt-2">${new Date(x.time).toLocaleString('th-TH')}</p>
        </div>
      `).join('');
    })();
  </script>
</body>
</html>
