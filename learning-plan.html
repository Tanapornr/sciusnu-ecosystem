<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แผนการเรียนรู้ของฉัน - Learning Ecosystem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="learner-state.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Prompt', 'sans-serif'] },
          colors: { sidebarBg: '#0f172a', primaryPurple: '#4f46e5', bgLight: '#f8fafc' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Prompt', sans-serif; background: #f8fafc; }
    .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; box-shadow: 0 4px 12px rgba(0,0,0,.02); }
  </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700 bg-bgLight">
  <aside class="w-64 bg-sidebarBg text-white flex flex-col justify-between hidden md:flex z-20 shrink-0">
    <div>
      <div class="p-6 flex items-center gap-3"><div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="ph-fill ph-book-open text-xl"></i></div><h1 class="text-base font-semibold leading-tight tracking-wide">Learning<br>Ecosystem</h1></div>
      <nav class="px-4 space-y-1 text-sm">
        <a href="staff-home.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-house text-xl"></i> หน้าหลัก</a>
        <a href="staff.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-graduation-cap text-xl"></i> คอร์สเรียนของฉัน</a>
        <a href="learning-plan.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-600 text-white rounded-xl font-medium"><i class="ph-fill ph-git-branch text-xl"></i> แผนการเรียนรู้</a>
        <a href="certificates.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-certificate text-xl"></i> ใบประกาศนียบัตร</a>
        <a href="history.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-clock-counter-clockwise text-xl"></i> ประวัติการเรียน</a>
        <a href="favorites.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-heart text-xl"></i> รายการโปรด</a>
        <a href="activity.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-activity text-xl"></i> กิจกรรมของฉัน</a>
        <a href="messages.html" class="flex items-center justify-between px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl">
          <span class="flex items-center gap-3"><i class="ph ph-chat-circle-dots text-xl"></i> ข้อความ</span>
          <span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">3</span>
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl"><i class="ph ph-gear text-xl"></i> ตั้งค่า</a>
      </nav>
    </div>
    <div class="p-4 border-t border-slate-800"><button onclick="handleLogout()" class="w-full bg-slate-800 hover:bg-red-900/40 text-slate-300 hover:text-red-200 text-sm py-2.5 rounded-xl">ออกจากระบบ</button></div>
  </aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10 shrink-0">
      <div class="relative w-96"><i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i><input type="text" placeholder="ค้นหาทักษะ, แผนการเรียน..." class="w-full bg-slate-100 text-sm rounded-full pl-10 pr-4 py-2.5 focus:outline-none"></div>
      <div class="flex items-center gap-3 border-l pl-4"><div id="avatarContainer" class="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">US</div><div class="text-sm"><p id="userNameText" class="font-semibold text-slate-800 leading-tight">-</p><p id="userDeptText" class="text-xs text-slate-400">-</p></div></div>
    </header>

    <div class="p-8 max-w-[1400px] w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1 overflow-y-auto h-[calc(100vh-70px)]">
      <section class="lg:col-span-2 space-y-6">
        <div class="flex items-center gap-4"><div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl border border-indigo-100/30"><i class="ph-fill ph-git-branch"></i></div><div><h2 class="text-xl font-bold text-slate-800">แผนการเรียนรู้ของฉัน</h2><p class="text-xs text-slate-400">Roadmap รายบทตามลำดับจริงจากระบบเรียน</p></div></div>

        <div class="glass-card p-8 bg-white relative border border-slate-200">
          <div class="absolute left-11 top-14 bottom-14 w-0.5 bg-slate-200"></div>
          <div id="planTimeline" class="space-y-8 relative"></div>
        </div>
      </section>

      <aside class="space-y-6">
        <div class="glass-card p-6 bg-white border border-slate-200 h-full flex flex-col justify-between">
          <div>
            <h3 class="font-bold text-slate-800 text-sm border-b pb-3 mb-4 flex items-center gap-2"><i class="ph-bold ph-info text-indigo-600"></i> รายละเอียดสมรรถนะย่อย</h3>
            <div id="detailBox" class="space-y-4 text-xs text-slate-600"></div>
          </div>
          <div class="pt-6"><a href="staff.html" class="w-full inline-flex justify-center bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold py-3 rounded-xl transition">กลับไปที่คอร์สเรียนหลัก</a></div>
        </div>
      </aside>
    </div>
  </main>

<script>
const API_URL="/api/submit";
let lessons=[], progress={}, selected=0, user={};
window.onload=async()=>{const s=localStorage.getItem('user');if(!s)return location.href='index.html';user=JSON.parse(s);await LearnerState.init(user);userNameText.innerText=user.name||'-';userDeptText.innerText=user.department||'-';avatarContainer.innerText=(user.name||'U').substring(0,2);progress=LearnerState.getProgress();await loadData();render();};
function ord(t){let m=String(t||'').match(/^AI-(\d+)/i);if(m)return +m[1];m=String(t||'').match(/^5ส-(\d+)/i);if(m)return 100+ +m[1];return 999}
async function loadData(){
  const box=document.getElementById('planTimeline');
  box.innerHTML='<div class="text-slate-400 text-sm">กำลังโหลดข้อมูลบทเรียน...</div>';
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getLessons'})});
    const j=await r.json();
    lessons=(j.lessons||[]).sort((a,b)=>ord(a.title)-ord(b.title));
  }catch(e){
    lessons=[];
    box.innerHTML='<div class="text-rose-500 text-sm">โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชอีกครั้ง</div>';
  }
}
function render(){const box=document.getElementById('planTimeline');if(!lessons.length){box.innerHTML='<div class="text-slate-500 text-sm">ยังไม่พบบทเรียนในระบบ (ให้กลับไปหน้า คอร์สเรียนของฉัน เพื่อตรวจสอบว่ามีบทเรียนแล้ว)</div>';document.getElementById('detailBox').innerHTML='<div class="text-slate-400">ยังไม่มีข้อมูลให้แสดง</div>';return;}let unlocked=0;while(unlocked<lessons.length&&progress[lessons[unlocked].id]?.postDone)unlocked++;box.innerHTML=lessons.map((l,i)=>{const s=progress[l.id]||{};const done=!!s.postDone;const active=i===selected;const locked=i>unlocked;const dot=done?'<i class="ph ph-check"></i>':(locked?'🔒':String(i+1));const dotCls=done?'bg-emerald-500 text-white':locked?'bg-slate-200 text-slate-500':'bg-indigo-600 text-white';const badge=done?'<span class="bg-emerald-50 text-emerald-600 text-[10px] font-semibold px-2 py-0.5 rounded border border-emerald-200">เสร็จสิ้นแล้ว</span>':locked?'<span class="bg-slate-100 text-slate-500 text-[10px] font-semibold px-2 py-0.5 rounded border">ล็อกอยู่</span>':'<span class="bg-indigo-600 text-white text-[10px] font-semibold px-2 py-0.5 rounded">กำลังดำเนินการอยู่</span>';return `<div onclick="pick(${i})" class="flex gap-6 items-start p-3 rounded-2xl cursor-pointer transition border ${active?'bg-indigo-50/50 border-indigo-100/70':'border-transparent hover:bg-slate-50'}"><div class="w-6 h-6 rounded-full ${dotCls} flex items-center justify-center text-xs font-bold z-10 shrink-0 mt-1">${dot}</div><div class="flex-1">${badge}<h4 class="text-sm font-semibold ${active?'text-indigo-600':'text-slate-800'} mt-1.5">${l.title}</h4><p class="text-xs text-slate-500 mt-1">${(l.description||'-')}</p></div></div>`}).join('');renderDetails();}
function pick(i){selected=i;render();}
function renderDetails(){const l=lessons[selected];if(!l)return;const s=progress[l.id]||{};detailBox.innerHTML=`<div><h4 class="text-xs font-bold text-slate-400 tracking-wider uppercase">บทเรียนปัจจุบัน</h4><p class="text-sm font-semibold text-indigo-600 mt-1">${l.title}</p></div><div><h4 class="text-xs font-bold text-slate-400 tracking-wider uppercase">สถานะ</h4><ul class="list-disc list-inside space-y-1.5 mt-2 font-medium"><li>Pre-test: ${s.preDone?'ทำแล้ว':'ยังไม่ทำ'}</li><li>Video: ${s.videoDone?'ดูจบแล้ว':'ยังไม่จบ'}</li><li>Post-test: ${s.postDone?'ทำแล้ว':'ยังไม่ทำ'}</li></ul></div><div><h4 class="text-xs font-bold text-slate-400 tracking-wider uppercase">สมรรถนะย่อย</h4><p class="text-xs mt-2">${l.description||'-'}</p></div>`;}
function handleLogout(){localStorage.removeItem('user');location.href='index.html';}
</script>
</body>
</html>
