<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>แผนการเรียนรู้</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Prompt',sans-serif}</style></head><body class="bg-slate-50 text-slate-700"><div class="max-w-5xl mx-auto p-6"><h1 class="text-2xl font-bold mb-2">แผนการเรียนรู้</h1><p class="text-sm text-slate-500 mb-4">เชื่อมจากบทเรียนจริงและความคืบหน้าปัจจุบัน</p><div id="planBox" class="space-y-3"></div><a class="inline-block mt-6 text-indigo-600" href="staff.html">กลับหน้าบทเรียน</a></div><script>
const API_URL="https://script.google.com/macros/s/AKfycby_LQtHrmRmUDHrGVVgp_0vVfTpHPZTFzbty5GrU2ObqojoeavuSyYmmkVzeF7iqD0ffg/exec";
const user=JSON.parse(localStorage.getItem('user')||'{}');
function key(){return `lessonProgress_${(user.username||'guest').toLowerCase()}`}
function ord(t){let m=t.match(/^AI-(\d+)/i); if(m)return +m[1]; m=t.match(/^5ส-(\d+)/i); if(m)return 100+ +m[1]; return 999}
(async()=>{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getLessons'})});const j=await r.json();const p=JSON.parse(localStorage.getItem(key())||'{}');const ls=(j.lessons||[]).sort((a,b)=>ord(a.title)-ord(b.title));let html='';ls.forEach((l,i)=>{const s=p[l.id]||{};const done=!!s.postDone;const pre=!!s.preDone;const vd=!!s.videoDone;const st=done?'จบแล้ว':pre?(vd?'รอ Post-test':'กำลังดูวิดีโอ'):'รอ Pre-test';const comp=done?'✅':'⏳';html+=`<div class="bg-white border rounded-xl p-4"><div class="font-semibold">${i+1}. ${l.title}</div><div class="text-xs text-slate-500">สถานะ: ${comp} ${st}</div><div class="text-xs text-slate-500 mt-1">สมรรถนะย่อย: ${String(l.description||'-')}</div></div>`});document.getElementById('planBox').innerHTML=html||'<div class="text-slate-500">ไม่พบบทเรียน</div>'})();
</script></body></html>
