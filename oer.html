<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังทรัพยากร (OER)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #003355; --secondary: #11caa0; --bg-light: #f8fafc; --text-dark: #1e293b; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Kanit', sans-serif; }

        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 24px; display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #f0fdfa; color: var(--secondary); border-left-color: var(--secondary); }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: white; padding: 15px 40px; border-bottom: 1px solid #e2e8f0; }
        .page-container { padding: 30px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }

        .oer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .oer-item { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; display: flex; gap: 15px; background: white;}
        .oer-icon { width: 45px; height: 45px; background: #e0f2fe; color: #0284c7; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; flex-shrink: 0;}
        .btn-remix { background: #f1f5f9; border: none; padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 10px; width: 100%; transition: 0.2s; font-family: 'Sarabun';}
        .btn-remix:hover { background: var(--secondary); color: white; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #e2e8f0;"><h3 style="color: var(--primary);"><i class="fa-solid fa-flask-vial"></i> SCiUS OER</h3></div>
        <div style="padding: 15px 0;">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> หน้าหลัก (Dashboard)</a>
            <a href="oer.html" class="nav-item active"><i class="fa-solid fa-folder-open"></i> คลังทรัพยากร (OER)</a>
            <a href="course.html" class="nav-item"><i class="fa-solid fa-graduation-cap"></i> คอร์สเรียนสั้น</a>
            <a href="cop.html" class="nav-item"><i class="fa-solid fa-comments"></i> ชุมชน (CoP)</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header"><h3 style="color: var(--primary);">คลังทรัพยากร (OER)</h3></header>
        <div class="page-container">
            <h2 style="margin-bottom: 20px; color: var(--primary);"><i class="fa-solid fa-folder-tree"></i> ทรัพยากรพร้อมใช้งาน (Remix)</h2>
            <div class="card">
                <div id="oerContainer" class="oer-grid">
                    <p id="loadingText" style="color: var(--text-muted);">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        if(!localStorage.getItem('sciusUser')) window.location.href = "index.html";

        const API_URL = "https://script.google.com/macros/s/AKfycbynVPzzecMuLQdJqsg2Bct_C5MaGchty7SP16RFXukVGFnB1NAacS9bbpcb3Ct62PYq/exec"; 

        window.onload = async () => {
            const container = document.getElementById('oerContainer');
            if(API_URL === "") {
                container.innerHTML = `
                    <div class="oer-item">
                        <div class="oer-icon"><i class="fa-solid fa-file-word"></i></div>
                        <div style="width: 100%;">
                            <h4 style="color: var(--primary);">บันทึกขออนุมัติเบิกจ่าย วมว.</h4>
                            <p style="font-size: 13px; color: var(--text-muted);">Template อัปเดตล่าสุด</p>
                            <button class="btn-remix" onclick="alert('คัดลอกไฟล์ลง Drive สำเร็จ')"><i class="fa-solid fa-copy"></i> คัดลอกไปใช้</button>
                        </div>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getOER' }) });
                const data = await res.json();
                if(data.success) {
                    container.innerHTML = '';
                    data.data.forEach(item => {
                        let icon = 'fa-file-lines';
                        if(item.Type.toLowerCase() === 'word') icon = 'fa-file-word';
                        if(item.Type.toLowerCase() === 'excel') icon = 'fa-file-excel';

                        container.innerHTML += `
                            <div class="oer-item">
                                <div class="oer-icon"><i class="fa-solid ${icon}"></i></div>
                                <div style="width: 100%;">
                                    <h4 style="color: var(--primary);">${item.Title}</h4>
                                    <p style="font-size: 13px; color: var(--text-muted);">${item.Description}</p>
                                    <button class="btn-remix" onclick="alert('คัดลอกสำเร็จ!')"><i class="fa-solid fa-copy"></i> คัดลอกไปใช้</button>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch(e) {
                container.innerHTML = "โหลดข้อมูลล้มเหลว";
            }
        };
    </script>
</body>
</html>
