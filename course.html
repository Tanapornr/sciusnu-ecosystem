<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอร์สเรียน (Micro-learning)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #003355; --secondary: #11caa0; --bg-light: #f8fafc; --text-dark: #1e293b; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Kanit', sans-serif; }

        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 24px; display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #f0fdfa; color: var(--secondary); border-left-color: var(--secondary); }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: white; padding: 15px 40px; border-bottom: 1px solid #e2e8f0; }
        .page-container { padding: 30px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .course-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .course-thumb { height: 140px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; justify-content: center; align-items: center; color: white; font-size: 40px; position: relative;}
        .time-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 12px; padding: 3px 8px; border-radius: 8px; }
        .course-body { padding: 15px; }
        .progress-bar { width: 100%; height: 6px; background: #f1f5f9; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); }
        .btn-learn { width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-family: 'Sarabun'; transition: 0.2s;}
        .btn-learn:hover { background: var(--secondary); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #e2e8f0;"><h3 style="color: var(--primary);"><i class="fa-solid fa-flask-vial"></i> SCiUS OER</h3></div>
        <div style="padding: 15px 0;">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> หน้าหลัก (Dashboard)</a>
            <a href="oer.html" class="nav-item"><i class="fa-solid fa-folder-open"></i> คลังทรัพยากร (OER)</a>
            <a href="course.html" class="nav-item active"><i class="fa-solid fa-graduation-cap"></i> คอร์สเรียนสั้น</a>
            <a href="cop.html" class="nav-item"><i class="fa-solid fa-comments"></i> ชุมชน (CoP)</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="header"><h3 style="color: var(--primary);">คอร์สพัฒนาทักษะ (Micro-learning)</h3></header>
        <div class="page-container">
            <div id="courseContainer" class="course-grid">
                <p id="loadingText" style="color: var(--text-muted);">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </main>

    <script>
        if(!localStorage.getItem('sciusUser')) window.location.href = "index.html";
        const API_URL = "https://script.google.com/macros/s/AKfycbynVPzzecMuLQdJqsg2Bct_C5MaGchty7SP16RFXukVGFnB1NAacS9bbpcb3Ct62PYq/exec"; 

        window.onload = async () => {
            const container = document.getElementById('courseContainer');
            if(API_URL === "") {
                container.innerHTML = `
                    <div class="course-card">
                        <div class="course-thumb"><i class="fa-solid fa-laptop-code"></i><div class="time-badge">05:20</div></div>
                        <div class="course-body">
                            <h4 style="color: var(--primary);">ระบบจัดซื้อ e-GP ขั้นพื้นฐาน</h4>
                            <div class="progress-bar"><div class="progress-fill" style="width: 60%;"></div></div>
                            <button class="btn-learn" onclick="alert('เปิดวิดีโอ...')">เรียนต่อ (60%)</button>
                        </div>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getCourses' }) });
                const data = await res.json();
                if(data.success) {
                    container.innerHTML = '';
                    data.data.forEach(item => {
                        container.innerHTML += `
                            <div class="course-card">
                                <div class="course-thumb"><i class="fa-solid fa-video"></i><div class="time-badge">${item.Time}</div></div>
                                <div class="course-body">
                                    <h4 style="color: var(--primary);">${item.Title}</h4>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${item.Progress};"></div></div>
                                    <button class="btn-learn" onclick="alert('เปิดวิดีโอ...')">เรียน ${item.Progress}</button>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch(e) {
                container.innerHTML = "โหลดข้อมูลล้มเหลว";
            }
        };
    </script>
</body>
</html>
