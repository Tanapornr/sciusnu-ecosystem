<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex h-screen">

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-[#0B1A3A] text-white h-16 flex items-center justify-between px-6">
            <h2 class="text-lg font-semibold">แดชบอร์ดผู้บริหาร (Admin / Executive)</h2>
            <button class="bg-white text-[#0B1A3A] px-4 py-1.5 rounded text-sm font-medium">Export รายงาน</button>
        </header>

        <div class="p-6 overflow-y-auto">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-sm text-gray-600 mb-1">เลือกหน่วยงาน</label>
                    <select class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-[#0B1A3A]">
                        <option value="all">รวมทุกหน่วยงาน</option>
                        <option value="งานธุรการ">งานธุรการ</option>
                        <option value="งานการเงินและพัสดุ">งานการเงินและพัสดุ</option>
                        <option value="โครงการ วมว.">โครงการ วมว.</option>
                        <option value="งานนโยบายและแผน">งานนโยบายและแผน</option>
                        <option value="งานบริการการศึกษา">งานบริการการศึกษา</option>
                        <option value="งานห้องปฏิบัติการ">งานห้องปฏิบัติการ</option>
                        <option value="งานกิจการนิสิตและศิษย์เก่าสัมพันธ์">งานกิจการนิสิตและศิษย์เก่าสัมพันธ์</option>
                        <option value="งานกิจการนิสิต">งานกิจการนิสิต</option>
                    </select>
                </div>
                <button class="bg-[#0B1A3A] text-white px-6 py-2 rounded-lg text-sm"><i class="fas fa-search mr-2"></i> ค้นหา</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-sm text-gray-600">
                            <th class="p-4 font-semibold">ชื่อ - นามสกุล</th>
                            <th class="p-4 font-semibold">หน่วยงาน</th>
                            <th class="p-4 font-semibold text-center">เข้าเรียน (ครั้ง)</th>
                            <th class="p-4 font-semibold">ความก้าวหน้า</th>
                            <th class="p-4 font-semibold text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-4">สมหญิง รักงาน</td>
                            <td class="p-4">โครงการ วมว.</td>
                            <td class="p-4 text-center">12</td>
                            <td class="p-4">
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-green-500 h-2 rounded-full" style="width: 100%"></div>
                                </div>
                                <span class="text-xs text-gray-500 mt-1 inline-block">100% (ผ่าน)</span>
                            </td>
                            <td class="p-4 text-center">
                                <button class="text-blue-500 hover:text-blue-700 mx-1" title="แก้ไขหน่วยงาน"><i class="fas fa-edit"></i></button>
                                <button class="text-red-500 hover:text-red-700 mx-1" title="ลบผู้ใช้"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
