<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ประวัติการเรียน</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Prompt',sans-serif}</style></head><body class="bg-slate-50 text-slate-700"><div class="max-w-5xl mx-auto p-6"><h1 class="text-2xl font-bold mb-4">ประวัติการเรียนและคะแนนทดสอบ</h1><table class="w-full bg-white border rounded-xl overflow-hidden text-sm"><thead class="bg-slate-100"><tr><th class="p-3 text-left">บทเรียน</th><th class="p-3">Pre</th><th class="p-3">Post</th><th class="p-3">สถานะ</th></tr></thead><tbody id="rows"></tbody></table><a class="inline-block mt-6 text-indigo-600" href="staff.html">กลับหน้าบทเรียน</a></div><script>
const API_URL="https://script.google.com/macros/s/AKfycby_LQtHrmRmUDHrGVVgp_0vVfTpHPZTFzbty5GrU2ObqojoeavuSyYmmkVzeF7iqD0ffg/exec";
const user=JSON.parse(localStorage.getItem('user')||'{}');
const p=JSON.parse(localStorage.getItem(`lessonProgress_${(user.username||'guest').toLowerCase()}`)||'{}');
function ord(t){let m=t.match(/^AI-(\d+)/i); if(m)return +m[1]; m=t.match(/^5ส-(\d+)/i); if(m)return 100+ +m[1]; return 999}
(async()=>{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getLessons'})});const j=await r.json();const ls=(j.lessons||[]).sort((a,b)=>ord(a.title)-ord(b.title));document.getElementById('rows').innerHTML=ls.map(l=>{const s=p[l.id]||{};const pre=s.preDone?`${s.preScore||0}/${s.preTotal||0}`:'-';const post=s.postDone?`${s.postScore||0}/${s.postTotal||0}`:'-';const st=s.postDone?'จบแล้ว':s.videoDone?'รอ Post-test':s.preDone?'กำลังดูวิดีโอ':'รอ Pre-test';return `<tr class="border-t"><td class="p-3">${l.title}</td><td class="p-3 text-center">${pre}</td><td class="p-3 text-center">${post}</td><td class="p-3 text-center">${st}</td></tr>`}).join('')||'<tr><td class="p-3" colspan="4">ไม่พบบทเรียน</td></tr>'})();
</script></body></html>
