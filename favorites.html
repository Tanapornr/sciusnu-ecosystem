<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>รายการโปรด</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:'Prompt',sans-serif}</style></head><body class="bg-slate-50 text-slate-700"><div class="max-w-5xl mx-auto p-6"><h1 class="text-2xl font-bold mb-4">รายการโปรด</h1><p class="text-sm text-slate-500 mb-4">กดหัวใจจากหน้าบทเรียนเพื่อเก็บรายการ</p><div id="favBox" class="space-y-3"></div><a class="inline-block mt-6 text-indigo-600" href="staff.html">กลับหน้าบทเรียน</a></div><script>
const favKey='favoriteLessons';
const fav=JSON.parse(localStorage.getItem(favKey)||'[]');
const box=document.getElementById('favBox');
if(!fav.length){box.innerHTML='<div class="bg-white border rounded-xl p-4 text-slate-500">ยังไม่มีรายการโปรด</div>';} else {box.innerHTML=fav.map((f,i)=>`<div class="bg-white border rounded-xl p-4 flex justify-between items-center"><div>${f.title||f.id}</div><button class="text-rose-500" onclick="rm(${i})">ลบ</button></div>`).join('')}
function rm(i){fav.splice(i,1);localStorage.setItem(favKey,JSON.stringify(fav));location.reload();}
</script></body></html>
