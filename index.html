<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Learning Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { primary: '#1e3a8a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-white max-w-md w-full text-center">
        <div class="bg-primary text-white w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-md">
            <i class="ph-fill ph-graduation-cap"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-1">Learning Ecosystem</h2>
        <p class="text-sm text-slate-500 mb-6">ระบบนิเวศการเรียนรู้ดิจิทัล คณะวิทยาศาสตร์ มน.</p>

        <form onsubmit="handleLogin(event)" class="text-left space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้งาน (Username)</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                    <input type="text" id="username" required placeholder="เช่น staff01 หรือ admin01" class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน (Password)</label>
                <div class="relative">
                    <i class="ph ph-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white/50">
                </div>
            </div>

            <div id="errorMessage" class="text-red-500 text-xs hidden text-center font-medium bg-red-50 py-2 rounded-lg border border-red-100"></div>

            <button type="submit" id="loginBtn" class="w-full bg-primary hover:bg-blue-800 text-white font-medium py-3 rounded-xl shadow-lg transition flex items-center justify-center gap-2 mt-2">
                <i class="ph-bold ph-sign-in"></i> เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        // ⚠️ อย่าลืมนำ Web App URL จาก Google Apps Script มาใส่ตรงนี้แทนข้อความข้างล่างนะครับ
        const API_URL = "YOUR_WEB_APP_URL_HERE"; 

        async function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> กำลังตรวจสอบ...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('user', JSON.stringify(result.user));

                    if (result.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'staff.html'; 
                    }
                } else {
                    errorMsg.innerText = "⚠️ " + result.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.innerText = "⚠️ ไม่สามารถเชื่อมต่อกับฐานข้อมูลชีตได้";
                errorMsg.classList.remove('hidden');
            } finally { // แก้ไขจาก final เป็น finally เรียบร้อยครับ
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="ph-bold ph-sign-in"></i> เข้าสู่ระบบ';
            }
        }
    </script>
</body>
</html>
